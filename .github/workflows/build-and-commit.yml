name: Build and Commit Playlist

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 3 */7 * *' # каждые 7 дней в 03:00 UTC (подкорректируйте при необходимости)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run build script
        run: |
          python scripts/build_playlist.py --channels sources/requestedIPTV --sources sources/sourcesplaylists --temp playlist.m3u --out custom_playlist.m3u

      - name: Show diff
        run: git --no-pager diff --name-only || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep custom_playlist.m3u; then
            git add custom_playlist.m3u
            git commit -m "Auto-update playlist: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes to commit"
          fi
