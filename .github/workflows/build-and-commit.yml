name: Build IPTV Playlist

on:
  push:
    paths:
      - "sources/requestedIPTV"
      - "sources/sourcesplaylists"
      - "scripts/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Build playlist
        run: |
          python scripts/build_playlist.py \
            --channels sources/requestedIPTV \
            --sources sources/sourcesplaylists \
            --out playlist.m3u

      - name: Check for changes
        run: |
          if git diff --quiet playlist.m3u; then
            echo "No changes in playlist.m3u"
            echo "changed=false" >> $GITHUB_ENV
          else
            echo "Playlist updated"
            echo "changed=true" >> $GITHUB_ENV
          fi

      - name: Commit playlist
        if: env.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add playlist.m3u
          git commit -m "Update playlist.m3u"
          git push
