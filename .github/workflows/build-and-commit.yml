name: Build IPTV Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # запуск каждые 6 часов

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run playlist builder
        run: |
          python scripts/build_playlist.py

      - name: Commit playlist and logs
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

          git add playlist.m3u
          git add logs/playlist.log

          git commit -m "Auto-update playlist and logs" || echo "No changes to commit"

      - name: Push changes
        if: success()
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
